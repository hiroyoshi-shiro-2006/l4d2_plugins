sv_maxplayers "8" //max number of players that can join the server
sv_force_unreserved "1" //allows player to join server past the normal limit of the gamemode, such as 4 for coop
sv_allow_lobby_connect_only "0" //allows players to join game through other means besides the lobby
sv_lan "0" //whether to allow public connections or not
sv_pausable "0" //allows pausing the game, only recommended for LAN games or playing with friends
//sm_cvar sb_all_bot_game "1" whether bots will keep playing when all human players are dead or leave the game

//variables below are only if you want to decrease/disable friendly fire in all difficulties
sm_cvar survivor_friendly_fire_factor_normal "0.01"    //default 0.1
sm_cvar survivor_friendly_fire_factor_hard "0.01"        //default 0.3
sm_cvar survivor_friendly_fire_factor_expert "0.01"    //default 0.5 
sm_cvar precache_all_survivors 1 // 1=Precache/Load all models of survivors to prevent crash
sm_cvar sv_consistency 0 // The server enforces file consistency (1: Enable, 0: Disable) 