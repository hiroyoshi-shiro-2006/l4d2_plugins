// Save Data by : 1 = MySQL, 0 = SQLite.
gxm_saveby "0"

// Save Data Type : 0 = SteamID, 1 = IP, 2 = Name.
gxm_savetype "2"


// Restrict weapon picking, based on levels? 1 - Yes, 0 - No.
gxm_restrict_guns "0"
// Remove weapons from the ground? 1 - Yes, 0 - No.
gxm_remove_guns "0"


// XP for killing infected/entity
gxm_xp_kill_infected "1"

// XP for killing survivor
gxm_xp_kill_survivor "100"

// XP for killing smoker
gxm_xp_kill_smoker "15"

// XP for killing boomer
gxm_xp_kill_boomer "15"

// XP for killing hunter
gxm_xp_kill_hunter "15"

// XP for killing spitter
gxm_xp_kill_spitter "15"

// XP for killing jockey
gxm_xp_kill_jockey "15"

// XP for killing charger
gxm_xp_kill_charger "15"

// XP for killing witch
gxm_xp_kill_witch "50"

// XP for killing tank
gxm_xp_kill_tank "100"


// Cvar for how many seconds menu is shown
gxm_menu_time "30"
// Delay to display menu when player spawned
gxm_menu_delay "3.0"
// Enable menu re-open ? 1 - Yes, 0 - No.
gxm_menu_reopen "1"
// >0 - Amount of time that menu shall reopen, 0 - Don't reopen.
gxm_menu_reopen_auto "180.0"


// Enable !top10 ? 1 - Yes, 0 - No.
gxm_enable_top10 "1"